<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VideoRank</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #f9fafb;
}

header {
    background: white;
    padding: 15px;
    text-align: center;
    font-weight: bold;
    font-size: 22px;
    color: #2563eb;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}

.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
    text-align: center;
}

h1 {
    margin-bottom: 5px;
}

p {
    color: #555;
}

.tabs {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin: 15px 0;
}

.tab {
    padding: 10px 15px;
    border-radius: 8px;
    cursor: pointer;
    background: #e5e7eb;
}

.tab.active {
    background: #2563eb;
    color: white;
}

input, button {
    width: 100%;
    padding: 12px;
    margin: 6px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
}

button {
    background: #2563eb;
    color: white;
    border: none;
    font-weight: bold;
    cursor: pointer;
}

.actions {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

.actions button {
    flex: 1;
    background: #111;
}

.loading {
    margin-top: 15px;
    display: none;
    font-weight: bold;
}

.results {
    margin-top: 20px;
    text-align: left;
}

.card {
    display: flex;
    gap: 12px;
    background: white;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 12px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}

.card img {
    width: 140px;
    border-radius: 8px;
}

.meta {
    font-size: 13px;
    color: #666;
}

a {
    color: #2563eb;
    text-decoration: none;
    font-weight: bold;
}

@media (max-width: 600px) {
    .card {
        flex-direction: column;
    }

    .actions {
        flex-direction: column;
    }

    .card img {
        width: 100%;
    }
}
</style>
</head>

<body>

<header>🎯 VideoRank</header>

<div class="container">

<h1>Find Viral Video Ideas</h1>
<p>Discover high-performing content, trending topics, and low-competition opportunities.</p>

<div class="tabs">
    <div class="tab active" onclick="setMode('best', this)">Best</div>
    <div class="tab" onclick="setMode('trending', this)">Trending</div>
    <div class="tab" onclick="setMode('opportunity', this)">Opportunity</div>
</div>

<input id="query" placeholder="Enter topic (e.g. AI tools, fitness, motivation)" />
<input id="max" type="number" value="10" />
<input id="min_views" type="number" value="10000" />

<button onclick="searchVideos()">Search Videos</button>

<div class="actions">
    <button onclick="downloadCSV()">Download CSV</button>
    <button onclick="copyTop()">Copy Top Video</button>
</div>

<div class="loading" id="loading">Loading best results...</div>

<div id="stats"></div>
<div class="results" id="results"></div>

</div>

<script>
let currentMode = "best";
let currentResults = [];

function setMode(mode, el) {
    currentMode = mode;
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    el.classList.add("active");
}

async function searchVideos() {
    const query = document.getElementById("query").value.trim();
    const max = document.getElementById("max").value;
    const minViews = document.getElementById("min_views").value;

    if (!query) {
        alert("Enter a search topic");
        return;
    }

    const resultsDiv = document.getElementById("results");
    const loading = document.getElementById("loading");
    const stats = document.getElementById("stats");

    resultsDiv.innerHTML = "";
    stats.innerHTML = "";
    loading.style.display = "block";

    try {
        const res = await fetch(
            `https://youtube-scraper-mxsc.onrender.com/search?query=${query}&mode=${currentMode}&max_results=${max}&min_views=${minViews}`
        );

        const data = await res.json();
        loading.style.display = "none";

        currentResults = data.results || [];

        stats.innerHTML = `<p>Showing ${currentResults.length} results</p>`;

        if (!currentResults.length) {
            resultsDiv.innerHTML = "<p>No results found</p>";
            return;
        }

        currentResults.forEach((video, i) => {
            const div = document.createElement("div");
            div.className = "card";

            div.innerHTML = `
                <img src="${video.thumbnail}">
                <div>
                    <b>${i+1}. ${video.title}</b>
                    <div class="meta">👁 ${video.views} | ⭐ ${video.score}</div>
                    <a href="${video.url}" target="_blank">Watch</a>
                </div>
            `;

            resultsDiv.appendChild(div);
        });

    } catch (err) {
        loading.style.display = "none";
        resultsDiv.innerHTML = "<p>Error loading data</p>";
    }
}

function downloadCSV() {
    if (!currentResults.length) {
        alert("No data to download");
        return;
    }

    let csv = "Title,Views,Score,URL\n";

    currentResults.forEach(v => {
        csv += `"${v.title}",${v.views},${v.score},${v.url}\n`;
    });

    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "videos.csv";
    a.click();
}

function copyTop() {
    if (!currentResults.length) {
        alert("No results");
        return;
    }

    navigator.clipboard.writeText(currentResults[0].url);
    alert("Top video copied!");
}
</script>

</body>
</html>
